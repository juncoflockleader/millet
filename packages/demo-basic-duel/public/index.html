<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Millet Studio</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="studio-title">
          <span class="studio-eyebrow">Millet Studio</span>
          <h1 id="projectTitle">Project</h1>
          <p id="matchLine">Select a project to edit or preview.</p>
        </div>
        <div class="topbar-actions">
          <label class="project-switcher">
            <span>Project</span>
            <select id="projectSelect" aria-label="Studio project"></select>
          </label>
          <button id="previewPanelButton" class="ghost" type="button">Preview</button>
          <button id="assetLibraryButton" class="ghost" type="button">Assets</button>
          <button id="cardStudioButton" class="ghost" type="button">Cards</button>
          <button id="presentationEditorButton" class="ghost" type="button">Presentation</button>
          <button id="layoutEditorButton" class="ghost" type="button">Layout</button>
          <button id="playtestPanelButton" class="ghost" type="button">Playtest</button>
          <button id="newMatchButton" type="button">New Match</button>
          <button id="refreshButton" type="button" disabled>Refresh</button>
        </div>
      </header>

      <section class="play-area" id="playArea" aria-label="Scaled project play area">
        <div class="arena-scale-box" id="arenaScaleBox">
          <section class="arena" id="arena" aria-label="Project board">
            <div class="effect-layer" id="effectLayer" aria-hidden="true"></div>
            <div class="layout-guides" id="layoutGuides" aria-hidden="true">
              <div class="layout-region-layer" id="layoutRegionLayer"></div>
              <button class="layout-handle row-handle row-handle-a" type="button" data-layout-handle="row-a" aria-label="Resize opponent and center rows"></button>
              <button class="layout-handle row-handle row-handle-b" type="button" data-layout-handle="row-b" aria-label="Resize center and player rows"></button>
              <button class="layout-handle col-handle hero-col-handle" type="button" data-layout-handle="hero-col" aria-label="Resize hero column"></button>
              <button class="layout-handle col-handle center-col-handle" type="button" data-layout-handle="center-col" aria-label="Resize center lane columns"></button>
            </div>
            <div class="absolute-preview-board" id="absolutePreviewBoard" aria-label="Authored board layout preview"></div>
            <div class="player-row opponent" id="p2Panel"></div>
            <div class="center-lane" id="centerLane">
              <div class="turn-panel" id="turnPanel">
                <div class="selector" role="tablist" aria-label="Current player controls">
                  <button id="selectP1" type="button" data-player="p1">P1</button>
                  <button id="selectP2" type="button" data-player="p2">P2</button>
                </div>
                <div class="turn-copy">
                  <strong id="turnText">No match</strong>
                  <span id="statusText">Waiting</span>
                </div>
                <button id="endTurnButton" class="ghost" type="button" disabled>End Turn</button>
                <div class="prompt-summary" id="promptSummary"></div>
              </div>
              <div class="battle-log" id="battleLog" aria-live="polite"></div>
              <aside class="chat-window" id="chatWindow" aria-live="polite">
                <strong>Chat</strong>
                <span>Offline</span>
                <small>0 messages</small>
              </aside>
            </div>
            <div class="player-row" id="p1Panel"></div>
          </section>
        </div>
      </section>
      <aside class="layout-editor" id="layoutEditor" aria-label="Board layout editor" hidden>
        <div class="layout-editor-head">
          <div>
            <strong>Board Layout</strong>
            <span id="layoutRegionCount">0 regions</span>
          </div>
          <button id="closeLayoutEditorButton" class="ghost icon-button" type="button" aria-label="Close layout editor">X</button>
        </div>
        <div class="layout-editor-body">
          <section class="layout-editor-section" aria-label="Layout token controls">
            <div class="layout-section-head">
              <strong>Tokens</strong>
              <span>Fast 1v1 controls</span>
            </div>
            <div class="layout-controls" id="layoutControls"></div>
          </section>
          <section class="layout-editor-section layout-region-editor" aria-label="Board regions">
            <div class="layout-section-head">
              <strong>Regions</strong>
              <div class="layout-section-actions">
                <label class="layout-snap-toggle" title="Snap region geometry to an 8px grid">
                  <input id="snapLayoutToggle" type="checkbox">
                  <span>Snap</span>
                </label>
                <select id="layoutRegionPresetSelect" aria-label="Region preset">
                  <option value="custom">Custom</option>
                </select>
                <button id="addLayoutRegionButton" class="ghost" type="button">Add</button>
                <button id="duplicateLayoutRegionButton" class="ghost" type="button">Copy</button>
                <button id="mirrorLayoutRegionXButton" class="ghost" type="button" title="Mirror selected region horizontally">Flip X</button>
                <button id="mirrorLayoutRegionYButton" class="ghost" type="button" title="Mirror selected region vertically">Flip Y</button>
                <button id="fillLayoutRegionButton" class="ghost" type="button">Fill</button>
                <button id="deleteLayoutRegionButton" class="ghost" type="button">Delete</button>
              </div>
            </div>
            <div class="layout-region-editor-body">
              <div class="layout-region-list" id="layoutRegionList" role="listbox" aria-label="Board layout regions"></div>
              <div class="layout-region-inspector">
                <div class="layout-region-detail" id="layoutRegionDetail"></div>
                <div class="layout-widget-detail" id="layoutWidgetDetail"></div>
              </div>
            </div>
            <div class="layout-diagnostics" id="layoutDiagnostics" aria-live="polite"></div>
          </section>
        </div>
        <div class="layout-editor-actions">
          <button id="fitLayoutButton" class="ghost" type="button">Fit Rows</button>
          <button id="resetLayoutButton" class="ghost" type="button">Reset</button>
          <button id="copyLayoutButton" type="button">Copy JSON</button>
          <button id="importLayoutButton" class="ghost" type="button">Import</button>
        </div>
        <textarea id="layoutJson" spellcheck="false" aria-label="Layout JSON export"></textarea>
        <p class="layout-editor-status" id="layoutEditorStatus" aria-live="polite"></p>
      </aside>
      <aside class="preview-panel" id="previewPanel" aria-label="UI preview fixtures" hidden>
        <div class="panel-head">
          <div>
            <strong>Preview Fixtures</strong>
            <span id="previewFixtureCount">0 fixtures</span>
          </div>
          <button id="closePreviewPanelButton" class="ghost icon-button" type="button" aria-label="Close preview fixtures">X</button>
        </div>
        <div class="preview-list" id="previewFixtureList" role="listbox" aria-label="Preview fixtures"></div>
        <p class="preview-panel-status" id="previewPanelStatus" aria-live="polite"></p>
      </aside>
      <aside class="playtest-panel" id="playtestPanel" aria-label="Integrated playtest and debug" hidden>
        <div class="panel-head">
          <div>
            <strong>Playtest</strong>
            <span id="playtestProjectLine">No project</span>
          </div>
          <button id="closePlaytestPanelButton" class="ghost icon-button" type="button" aria-label="Close playtest panel">X</button>
        </div>
        <div class="playtest-panel-body" id="playtestPanelBody"></div>
        <p class="playtest-panel-status" id="playtestPanelStatus" aria-live="polite"></p>
      </aside>
      <aside class="asset-library" id="assetLibrary" aria-label="Asset library" hidden>
        <div class="panel-head">
          <div>
            <strong>Asset Library</strong>
            <span id="assetCount">0 assets</span>
          </div>
          <div class="panel-head-actions">
            <button id="newAssetButton" class="ghost" type="button">New Asset</button>
            <button id="closeAssetLibraryButton" class="ghost icon-button" type="button" aria-label="Close asset library">X</button>
          </div>
        </div>
        <div class="asset-filter" id="assetFilter" role="tablist" aria-label="Asset filters"></div>
        <div class="asset-library-body">
          <div class="asset-list" id="assetList" role="listbox" aria-label="Assets"></div>
          <div class="asset-detail" id="assetDetail"></div>
        </div>
        <p class="asset-library-status" id="assetLibraryStatus" aria-live="polite"></p>
      </aside>
      <aside class="card-studio" id="cardStudio" aria-label="Card template studio" hidden>
        <div class="panel-head">
          <div>
            <strong>Card Templates</strong>
            <span id="cardTemplateCount">0 templates</span>
          </div>
          <button id="closeCardStudioButton" class="ghost icon-button" type="button" aria-label="Close card template studio">X</button>
        </div>
        <div class="card-filter" id="cardTemplateFilter" role="tablist" aria-label="Card template filters"></div>
        <div class="card-studio-body">
          <div class="card-template-list" id="cardTemplateList" role="listbox" aria-label="Card templates"></div>
          <div class="card-template-detail" id="cardTemplateDetail"></div>
        </div>
        <p class="card-studio-status" id="cardStudioStatus" aria-live="polite"></p>
      </aside>
      <aside class="presentation-editor" id="presentationEditor" aria-label="Presentation catalog editor" hidden>
        <div class="panel-head">
          <div>
            <strong>Presentation Catalog</strong>
            <span id="presentationEntryCount">0 entries</span>
          </div>
          <button id="closePresentationEditorButton" class="ghost icon-button" type="button" aria-label="Close presentation editor">X</button>
        </div>
        <div class="presentation-editor-body">
          <div class="presentation-entry-list" id="presentationEntryList" role="listbox" aria-label="Presentation entries"></div>
          <div class="presentation-entry-detail">
            <div class="hero-presentation-editor" id="heroPresentationEditor"></div>
            <textarea id="presentationEntryJson" spellcheck="false" aria-label="Presentation entry JSON"></textarea>
            <div class="presentation-editor-actions">
              <button id="applyPresentationEntryButton" type="button">Apply</button>
              <button id="copyPresentationCatalogButton" class="ghost" type="button">Copy Catalog</button>
              <button id="resetPresentationCatalogButton" class="ghost" type="button">Reset</button>
            </div>
          </div>
        </div>
        <p class="presentation-editor-status" id="presentationEditorStatus" aria-live="polite"></p>
      </aside>
      <div class="tooltip-layer" id="tooltipLayer" role="tooltip" hidden></div>
    </main>

    <script src="/studio-projects.js" defer></script>
    <script src="/app.js" defer></script>
  </body>
</html>
